<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-gray-50 text-gray-800 font-[Inter] antialiased h-screen overflow-hidden selection:bg-indigo-100 selection:text-indigo-700">

    <div id="loader" class="fixed inset-0 bg-white/90 z-50 flex items-center justify-center hidden backdrop-blur-sm">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-100 border-t-indigo-600"></div>
    </div>

    <!-- Login Section -->

    <section id="login-section" class="h-full flex flex-col items-center justify-center p-4">
        <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-[440px] border border-gray-100">
            <div class="text-center mb-8 flex flex-col items-center">
                <img src="./assets/github-logo.png" alt="GitHub" class="w-16 h-16 mb-4 object-contain opacity-90">
                <h1 class="text-2xl font-bold text-gray-900 tracking-tight">GitHub Issues Tracker</h1>
                <p class="text-gray-500 text-sm mt-2">Sign in to manage your issues</p>
            </div>

            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">Username</label>
                    <input type="text" id="username" placeholder="Enter Username" 
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none transition shadow-sm placeholder-gray-400" value="admin">
                    <p class="text-xs text-[#4A00FF] mt-1.5 font-medium">Default: admin</p>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">Password</label>
                    <input type="password" id="password" placeholder="Enter Password" 
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none transition shadow-sm placeholder-gray-400" value="admin123">
                    <p class="text-xs text-[#4A00FF] mt-1.5 font-medium">Default: admin123</p>
                </div>

                <div id="login-error" class="text-red-500 text-sm text-center font-medium hidden bg-red-50 py-2 rounded">Invalid credentials</div>

                <button type="submit" 
                    class="w-full bg-[#4A00FF] hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg transition duration-200 shadow-md hover:shadow-lg transform active:scale-[0.99]">
                    Sign In
                </button>
            </form>

            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-200"></div>
                </div>
                <div class="relative flex justify-center text-xs uppercase tracking-wide">
                    <span class="px-3 bg-white text-gray-400 font-medium">OR</span>
                </div>
            </div>

            <div class="bg-gray-50 p-5 rounded-xl text-center text-sm border border-gray-100">
                <p class="text-gray-500 mb-2 font-medium">Demo Credentials:</p>
                <div class="flex flex-col gap-1 text-gray-800">
                    <p>Username: <span class="font-bold">admin</span></p>
                    <p>Password: <span class="font-bold">admin123</span></p>
                </div>
            </div>
        </div>
    </section>

    <!-- Dashboard Section -->
    <section id="dashboard-section" class="hidden h-full flex flex-col bg-[#F9FAFB]">
        <nav class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center shrink-0 shadow-sm z-10">
            <div class="flex items-center gap-3">
                <img src="./assets/github-logo.png" alt="Logo" class="w-8 h-8 object-contain">
                <h1 class="text-lg font-bold text-gray-800 hidden sm:block tracking-tight">GitHub Issues Tracker</h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="relative hidden sm:block">
                    <i class="fa-solid fa-search absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                    <input type="text" id="search-input" placeholder="Search issues..." 
                        class="pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition w-72 placeholder-gray-500">
                </div>
                <button id="new-issue-btn" class="bg-[#4F46E5] hover:bg-indigo-700 text-white px-5 py-2 rounded-md text-sm font-semibold transition shadow-sm flex items-center gap-2">
                    <i class="fa-solid fa-plus text-xs"></i> New Issue
                </button>
            </div>
        </nav>

        <main class="flex-1 overflow-y-auto p-4 sm:p-8">
            <div class="max-w-[1400px] mx-auto">
                <div class="sm:hidden mb-4">
                    <div class="relative">
                        <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="search-input-mobile" placeholder="Search issues..." class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-600">
                    </div>
                </div>

                <!-- Tabs and Stats -->
                <div class="bg-white rounded-xl border border-gray-200 p-4 mb-6 flex items-center gap-4 w-full justify-center md:justify-start">
                    <button id="tab-all" class="px-5 py-2 rounded-md text-sm font-medium transition-all bg-[#4F46E5] text-white border border-transparent">All</button>
                    <button id="tab-open" class="px-5 py-2 rounded-md text-sm font-medium transition-all bg-white text-gray-600 border border-gray-200 hover:bg-gray-50">Open</button>
                    <button id="tab-closed" class="px-5 py-2 rounded-md text-sm font-medium transition-all bg-white text-gray-600 border border-gray-200 hover:bg-gray-50">Closed</button>
                </div>

                <div class="bg-white rounded-xl p-5 mb-6 border border-gray-200 shadow-sm flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-full bg-indigo-50 flex items-center justify-center">
                            <img src="./assets/Aperture.png" alt="Stats" class="w-8 h-8 object-contain">
                        </div>
                        <div>
                            <h2 class="text-lg font-bold text-gray-900"><span id="issue-count">0</span> Issues</h2>
                            <p class="text-xs text-gray-500 mt-0.5">Track and manage your project issues</p>
                        </div>
                    </div>
                </div>

                <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5"></div>
                
                <div id="no-results" class="hidden flex flex-col items-center justify-center py-24 text-center">
                    <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mb-4">
                        <i class="fa-regular fa-folder-open text-2xl text-gray-400"></i>
                    </div>
                    <h3 class="text-lg font-semibold text-gray-900">No issues found</h3>
                </div>
            </div>
        </main>
    </section>
    <script type="module" src="./script.js"></script>

</body>
</html>
